<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recording</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0D0D0D;
            --surface: #1A1A1A;
            --border: #2A2A2A;
            --text: #E8E8E8;
            --text-muted: #707070;
            --accent: #00E5CC;
            --amber: #FFB800;
            --red: #FF3355;
        }

        html, body {
            height: 100%;
            background: transparent;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }

        .indicator {
            width: 200px;
            height: 60px;
            background: var(--bg);
            border: 2px solid var(--red);
            border-radius: 4px;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 4px 20px rgba(255, 51, 85, 0.3),
                        0 0 40px rgba(255, 51, 85, 0.1);
            animation: glow 1.5s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 4px 20px rgba(255, 51, 85, 0.3),
                            0 0 40px rgba(255, 51, 85, 0.1);
            }
            50% {
                box-shadow: 0 4px 30px rgba(255, 51, 85, 0.5),
                            0 0 60px rgba(255, 51, 85, 0.2);
            }
        }

        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: var(--red);
            border-radius: 50%;
            animation: pulse 0.6s ease-in-out infinite alternate;
            box-shadow: 0 0 8px var(--red);
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0.6;
                transform: scale(0.9);
            }
        }

        .label {
            font-size: 10px;
            font-weight: 700;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time {
            font-size: 14px;
            font-weight: 700;
            color: var(--amber);
            font-variant-numeric: tabular-nums;
        }

        .level-container {
            height: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .level-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg,
                var(--accent) 0%,
                var(--accent) 60%,
                var(--amber) 80%,
                var(--red) 100%
            );
            transition: width 50ms ease-out;
            border-radius: 1px;
        }

        .level-segments {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            gap: 2px;
            padding: 1px;
        }

        .segment {
            flex: 1;
            background: transparent;
            border-right: 1px solid var(--bg);
        }

        .segment:last-child {
            border-right: none;
        }
    </style>
</head>
<body>
    <div class="indicator">
        <div class="top-row">
            <div class="status">
                <div class="pulse-dot"></div>
                <span class="label">REC</span>
            </div>
            <span class="time" id="time">0:00</span>
        </div>
        <div class="level-container">
            <div class="level-bar" id="levelBar"></div>
            <div class="level-segments">
                <div class="segment"></div>
                <div class="segment"></div>
                <div class="segment"></div>
                <div class="segment"></div>
                <div class="segment"></div>
                <div class="segment"></div>
                <div class="segment"></div>
                <div class="segment"></div>
                <div class="segment"></div>
                <div class="segment"></div>
            </div>
        </div>
    </div>

    <script>
        const timeEl = document.getElementById('time');
        const levelBar = document.getElementById('levelBar');

        function updateTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            timeEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateLevel(level) {
            // level is 0.0 to 1.0
            const percentage = Math.min(100, Math.max(0, level * 100));
            levelBar.style.width = percentage + '%';
        }

        // Initial state
        updateTime(0);
        updateLevel(0);
    </script>
</body>
</html>
